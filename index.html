<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body style="background: #050505; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">

    <div id="status">Загрузка защищенного контента...</div>

    <script>
        window.onload = function() {
            const target = "www.fanvue.com/mikasa.chan.fans/fv-1";
            const fullUrl = "https://" + target;

            // ХАК №1: Невидимый iframe с intent (только для Android)
            // Иногда TikTok пропускает intent внутри iframe, считая это "загрузкой файла"
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = `intent://${target}#Intent;scheme=https;end`;
            document.body.appendChild(iframe);

            // ХАК №2: Попытка через специфический протокол (для iOS/Android)
            // Мы пробуем вызвать Chrome/Safari напрямую через протоколы
            setTimeout(() => {
                window.location.href = `googlechromes://${target}`;
            }, 100);

            setTimeout(() => {
                window.location.href = `microsoft-edge://${fullUrl}`;
            }, 200);

            // ХАК №3: Попытка вызвать "скачивание" (самый вероятный способ вызвать меню)
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = fullUrl;
                a.download = 'secure_access'; // Тикток не умеет качать и может предложить браузер
                a.click();
            }, 500);

            // Если всё выше провалилось через 2 секунды — показываем, что делать юзеру
            setTimeout(() => {
                document.getElementById('status').innerHTML = `
                    <div style="text-align:center;">
                        <p>TikTok заблокировал автоматический вход 😤</p>
                        <button onclick="location.reload()" style="padding:15px; background:#ff2d55; border:none; color:#fff; border-radius:10px; font-weight:bold;">
                            ПОПРОБОВАТЬ ЕЩЕ РАЗ
                        </button>
                        <p style="font-size:12px; margin-top:15px; opacity:0.6;">Или нажми на 3 точки в углу ↗️</p>
                    </div>
                `;
            }, 2000);
        };
    </script>
</body>
</html>
