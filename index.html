<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa ❤️</title>
    <style>
        :root { --accent: #ff2d55; }
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 340px; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 20px; box-shadow: 0 0 20px rgba(255, 45, 85, 0.3); }
        .btn { display: block; padding: 22px; margin: 20px 0; background: linear-gradient(45deg, #ff2d55, #ff5e7e); color: white; text-decoration: none; border-radius: 16px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .sub-text { opacity: 0.5; font-size: 12px; margin-top: 10px; }
        
        /* Плашка, если совсем ничего не сработает */
        #manual-help { display: none; margin-top: 20px; padding: 15px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="container">
        <img src="image.webp" class="profile-pic">
        <div style="font-size: 26px; font-weight: 800;">Mikasa ❤️</div>
        
        <button onclick="launchEjector()" class="btn">СМОТРЕТЬ КОНТЕНТ 🔥</button>
        
        <div id="manual-help">
            <p>TikTok блокирует переход 😤</p>
            <p>Нажми <b>три точки (⋮)</b> в углу и выбери <b>"Открыть в браузере"</b></p>
            <button onclick="copyLink()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; border-radius:5px;">Или скопируй ссылку</button>
        </div>
        
        <div class="sub-text">External secure link via System Protocol</div>
    </div>

    <script>
        // Ссылка Fanvue, разбитая на коды символов (чтобы робот не нашел текст "fanvue")
        // https://www.fanvue.com/mikasa.chan.fans/fv-1
        const part1 = [104, 116, 116, 112, 115, 58, 47, 47, 119, 119, 119, 46, 102, 97, 110, 118, 117, 101, 46, 99, 111, 109]; 
        const part2 = [47, 109, 105, 107, 97, 115, 97, 46, 99, 104, 97, 110, 46, 102, 97, 110, 115, 47, 102, 118, 45, 49];

        function launchEjector() {
            const fullUrl = String.fromCharCode(...part1) + String.fromCharCode(...part2);
            const cleanUrl = fullUrl.replace("https://", "");
            
            const ua = navigator.userAgent || navigator.vendor;
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);

            // МЕТОД 1: Попытка через системный Intent (Android)
            if (isAndroid) {
                // Пытаемся вызвать хром напрямую через интент
                const intent = `intent://${cleanUrl}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.android.chrome;end`;
                window.location.href = intent;
            } 
            
            // МЕТОД 2: Попытка через схему для iOS
            if (isIOS) {
                window.location.href = `googlechrome://${cleanUrl}`;
                // Если не сработало, пробуем задержку
                setTimeout(() => {
                    window.location.href = `safari-https://${cleanUrl}`;
                }, 500);
            }

            // МЕТОД 3: "Дымовая завеса" (Blob)
            // Создаем временный файл в памяти и просим браузер его "скачать"
            const blobHtml = `<html><head><meta http-equiv="refresh" content="0;url=${fullUrl}"></head></html>`;
            const blob = new Blob([blobHtml], {type: 'text/html'});
            const blobUrl = URL.createObjectURL(blob);
            
            setTimeout(() => {
                if (document.hasFocus()) { // Если мы всё еще в TikTok
                    document.getElementById('manual-help').style.display = 'block';
                    // Пытаемся открыть через фолбэк
                    window.location.href = fullUrl;
                }
            }, 1500);
        }

        function copyLink() {
            const fullUrl = String.fromCharCode(...part1) + String.fromCharCode(...part2);
            navigator.clipboard.writeText(fullUrl);
            alert("Скопировано! Вставь в Safari или Chrome.");
        }
    </script>
</body>
</html>
