<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa ❤️</title>
    <style>
        /* ... твои старые стили ... */
        :root { --accent: #ff2d55; }
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { text-align: center; z-index: 2; width: 90%; max-width: 350px; }
        .link-button { display: block; padding: 20px; margin: 15px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,45,85,0.3); border-radius: 15px; color: white; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* Слой маскировки (лоадер) */
        #loading-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #050505; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,45,85,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="status-text" style="margin-top: 20px; font-size: 14px; opacity: 0.6;">Проверка безопасности...</p>
    </div>

    <div class="container">
        <img src="image.webp" style="width:120px; border-radius:50%; margin-bottom: 20px;">
        <div style="font-size: 24px; font-weight: 800; margin-bottom: 30px;">Mikasa ❤️</div>
        
        <div class="link-button" onclick="startSecureProcess()" style="background: rgba(255,45,85,0.15);">
            ENTER EXCLUSIVE CONTENT 🔥
        </div>
        
        <a href="https://instagram.com/..." class="link-button">Instagram</a>
    </div>

    <script>
        // 1. Шифруем твою ссылку. 
        // Инструкция: Зайди на любой сайт "Base64 Encoder", зашифруй свою ссылку Fanvue 
        // и вставь результат в переменную ниже.
        // Сейчас там зашифровано: "https://www.fanvue.com/mikasa.chan.fans/fv-1"
        const _payload = "aHR0cHM6Ly93d3cuZmFudnVlLmNvbS8="; // Это префикс
        const _data = "bWlrYXNhLmNoYW4uZmFucy9mdi0x";      // Это хвост

        function startSecureProcess() {
            // Показываем лоадер, чтобы TikTok "подумал", что идет системный процесс
            const screen = document.getElementById('loading-screen');
            const status = document.getElementById('status-text');
            screen.style.display = 'flex';

            setTimeout(() => { status.innerText = "Генерация защищенного ключа..."; }, 800);
            setTimeout(() => { status.innerText = "Перенаправление..."; }, 1600);

            setTimeout(() => {
                executeJump();
            }, 2200);
        }

        function executeJump() {
            // Собираем ссылку из кусков в памяти в самый последний момент
            const gate = window.atob(_payload);
            const key = window.atob(_data);
            const target = gate + key;

            const ua = navigator.userAgent || navigator.vendor;
            const isAndroid = /Android/i.test(ua);

            // Трюк с "двойным прыжком"
            if (isAndroid) {
                const intent = `intent://${target.replace('https://', '')}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.android.chrome;end`;
                window.location.replace(intent);
            } else {
                // Для iOS используем window.open через невидимый элемент
                const a = document.createElement('a');
                a.href = target;
                a.rel = 'noreferrer'; // Отрезаем реферер, чтобы Fanvue не знал, что мы из TikTok
                a.click();
            }

            // Фолбэк, если через 2 секунды ничего не вышло
            setTimeout(() => {
                window.location.href = target;
            }, 2000);
        }
    </script>
</body>
</html>
