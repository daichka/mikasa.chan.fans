<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa &#x2764;&#xfe0f;</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ff2d55;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 340px;
            margin-bottom: 12vh; 
            z-index: 2;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.2);
        }

        .profile-name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .links-column {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-button {
            width: 100%;
            min-height: 60px;
            padding: 0 20px;
            box-sizing: border-box;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            line-height: 1.2;
            cursor: pointer;
        }

        .link-button.primary {
            background: rgba(255, 45, 85, 0.15);
            border-color: rgba(255, 45, 85, 0.4);
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.1);
        }

        .link-button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
        }

        .bg-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.1) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* Улучшенная заглушка In-App браузера (не мешает кликать на ссылки) */
        #in-app-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 45, 85, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            text-align: center;
            padding: 15px 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #in-app-overlay.active {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        #in-app-overlay h2 {
            font-size: 18px;
            margin: 0 0 5px 0;
            color: white;
        }

        #in-app-overlay p {
            font-size: 14px;
            margin: 0;
            color: #fff;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="in-app-overlay">
        <h2>⚠️ Открой в браузере!</h2>
        <p>Нажми на три точки в углу ↗️ и выбери «Открыть в браузере» для лучшей работы сайта.</p>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <img src="image.webp" alt="Mikasa" class="profile-pic">
        
        <div class="profile-name">Mikasa&#x2764;&#xfe0f;</div>
        
        <div class="links-column">
            <a href="https://www.fanvue.com/mikasa.chan.fans/fv-1" class="link-button primary">
                Exclusive content🔥 & Chat with me😏
            </a>
            <a href="https://www.instagram.com/mikasa.chan.fans" class="link-button">Instagram</a>
            <a href="https://tiktok.com/@mialaurentiam" class="link-button">TikTok</a>
        </div>
    </div>

    <script>
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            const isAndroid = /Android/.test(ua);
            // Проверка на встроенные браузеры
            const isInApp = /Instagram|TikTok|FBAN|FBAV|Twitter|Line|Viber|Snapchat/i.test(ua);

            // Функция для генерации ссылки внешнего браузера
            function getExternalUrl(url) {
                const cleanUrl = url.replace(/^https?:\/\//, '');
                if (isAndroid) {
                    return `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end`;
                } else if (isIOS) {
                    // Пытаемся зафорсить Chrome на iOS, если он установлен
                    return `googlechrome://${cleanUrl}`;
                }
                return url;
            }

            if (isInApp) {
                // 1. Показываем плашку-подсказку сверху страницы
                document.getElementById('in-app-overlay').classList.add('active');

                // 2. Агрессивная попытка редиректа при загрузке страницы
                const currentCleanUrl = window.location.href.replace(/^https?:\/\//, '');
                if (isAndroid) {
                    // Используем setTimeout, иногда это обходит блокировку авто-переходов
                    setTimeout(() => {
                        window.location.replace(`intent://${currentCleanUrl}#Intent;scheme=https;package=com.android.chrome;end`);
                    }, 100);
                } else if (isIOS) {
                    setTimeout(() => {
                        window.location.href = `googlechrome://${currentCleanUrl}`;
                    }, 100);
                }

                // 3. Перехват кликов по всем ссылкам
                const links = document.querySelectorAll('.link-button');
                links.forEach(link => {
                    const originalHref = link.getAttribute('href');
                    
                    link.addEventListener('click', function(e) {
                        e.preventDefault(); // Останавливаем обычный переход
                        
                        const intentUrl = getExternalUrl(originalHref);
                        
                        // Пытаемся открыть через Intent/схему во внешнем браузере
                        window.location.href = intentUrl;
                        
                        // Фолбэк: если внешний браузер не открылся за 1.5 секунды 
                        // (блокировка или нет нужного браузера), просто открываем ссылку внутри WebView
                        setTimeout(() => {
                            window.location.href = originalHref;
                        }, 1500);
                    });
                });
            }
        })();
    </script>
</body>
</html>
