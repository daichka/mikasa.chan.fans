<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa&#x2764;&#xfe0f;</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ff2d55; /* Неоновый розовый акцент */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Кайфовый анимированный фон */
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 340px;
            /* Приподнимаем контент чуть выше центра */
            margin-bottom: 12vh; 
            z-index: 2;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.2); /* Легкое свечение */
        }

        .profile-name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .links-column {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-button {
            width: 100%;
            min-height: 60px;
            padding: 0 20px;
            box-sizing: border-box;
            border-radius: 18px; /* Более современная форма */
            background: rgba(255, 255, 255, 0.05); /* Эффект стекла */
            backdrop-filter: blur(10px);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            line-height: 1.2;
        }

        /* Выделение главной кнопки */
        .link-button.primary {
            background: rgba(255, 45, 85, 0.15);
            border-color: rgba(255, 45, 85, 0.4);
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.1);
        }

        .link-button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Декоративный элемент на фоне */
        .bg-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.1) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <img src="image.webp" alt="Mikasa" class="profile-pic">
        
        <div class="profile-name">Mikasa❤️</div>
        
        <div class="links-column">
            <a href="https://www.fanvue.com/mikasa.chan.fans/fv-1" class="link-button primary">
                Exclusive content🔥 & Chat with me😏
            </a>
            <a href="https://www.instagram.com/mikasa.chan.fans" class="link-button">Instagram</a>
            <a href="https://tiktok.com/@mialaurentiam" class="link-button">TikTok</a>
        </div>
    </div>

    <script>
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInApp = /Instagram|TikTok|FBAN|FBAV|Twitter/i.test(ua);

            if (isInApp && /Android/i.test(ua)) {
                const currentUrl = window.location.href.replace(/https?:\/\//, "");
                window.location.href = `intent://${currentUrl}#Intent;scheme=https;package=com.android.chrome;end`;
            }
        })();
    </script>
</body>
</html>
